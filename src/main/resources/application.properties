spring.application.name=spring-security
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties]
# ============================
# DATASOURCE (H2 by default)
# ============================
spring.datasource.url=jdbc:h2:mem:spring_security_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ============================
# H2 CONSOLE
# ============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# ============================
# JWT
# ============================
jwt.secret_key=${BASE64_SECRET_KEY}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================
# APP MAIL
# ============================
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@mail.local}}
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.brevo.api-url=${BREVO_API_URL:https://api.brevo.com/v3}
app.mail.brevo.api-key=${BREVO_API_KEY:}
app.mail.brevo.timeout-seconds=${BREVO_API_TIMEOUT_SECONDS:15}
app.email-verification.code-ttl-minutes=${EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
# ============================
# SPRING MAIL
# ============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
# ============================
# FRONTEND URLs
# ============================
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
app.accept-invite.base-url=${ACCEPT_INVITE_BASE_URL:http://localhost:5173/accept-invite}
# ============================
# CORS
# ============================
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:3000}
# ============================
# LOGGING
# ============================
logging.level.root=WARN
logging.level.com.crishof=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.devtools.restart.SilentExitExceptionHandler=ERROR
logging.level.org.springframework.boot.devtools.restart=OFF
