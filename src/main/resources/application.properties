spring.application.name=Spring-Security
# =========================
# SERVER
# =========================
server.port=8080
# =========================
# DATASOURCE
# =========================
spring.datasource.url=jdbc:h2:mem:spring_security_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# =========================
# H2 CONSOLE
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# =========================
# JWT
# =========================
jwt.secret_key=${BASE64_SECRET_KEY}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# =========================
# APP MAIL
# =========================
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@horse-trust.local}
app.email-verification.code-ttl-minutes=${EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
# Frontend URLs
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
app.accept-invite.base-url=http://localhost:5173/accept-invite
# =========================
# CORS
# =========================
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000
# =========================
# SPRING MAIL
# =========================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
# =========================================
# PASSWORD RESET / EMAIL
# =========================================
# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.com.crishof.springsecurity=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
