# ============================
# DEV PROFILE - Development with H2
# ============================

# --- Datasource (H2 in memory) ---
spring.datasource.url=jdbc:h2:mem:spring_security_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- DDL: update preserves data between restarts ---
spring.jpa.hibernate.ddl-auto=update

# --- Frontend local ---
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
app.accept-invite.base-url=${ACCEPT_INVITE_BASE_URL:http://localhost:5173/accept-invite}

# --- Detailed logging in dev ---
spring.jpa.show-sql=true
logging.level.com.crishof=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

